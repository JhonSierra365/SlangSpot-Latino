[flake8]
max-line-length = 127
max-complexity = 10
exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    env,
    .env,
    static,
    media
ignore =
    E203,  # whitespace before ':'
    E501,  # line too long (handled by max-line-length)
    W503,  # line break before binary operator
    F401,  # module imported but unused (handled by import sorting)

[bandit]
exclude_dirs = migrations,static,media,venv
skips = B101,B601  # Skip assert checks and shell usage in tests