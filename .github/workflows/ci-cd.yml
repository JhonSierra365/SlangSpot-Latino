name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome for Selenium tests
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Chrome WebDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
        wget -O /tmp/chromedriver.zip https://chromedriver.storage.googleapis.com/$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION" | cut -d. -f1-3)/chromedriver_linux64.zip
        sudo unzip /tmp/chromedriver.zip -d /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver

    - name: Run Django migrations
      run: |
        python manage.py migrate
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    - name: Run unit tests
      run: |
        python manage.py test core.tests.test_models core.tests.test_forms core.tests.test_views --verbosity=2
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    - name: Run integration tests
      run: |
        python manage.py test core.tests.test_integration --verbosity=2
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        DJANGO_LIVE_TEST_SERVER_ADDRESS: 0.0.0.0:8000-8010

    - name: Check code quality with flake8
      run: |
        pip install flake8
        flake8 core/ slangspot/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 core/ slangspot/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check security with bandit
      run: |
        pip install bandit
        bandit -r core/ slangspot/ -f json -o bandit-report.json || true

    - name: Performance testing
      run: |
        pip install django-silk
        python manage.py test --settings=slangspot.settings --keepdb --verbosity=1
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: False
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          bandit-report.json
          **/test-results.xml
          **/coverage.xml

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/develop' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Railway (Staging)
      uses: railwayapp/actions@v1
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: slangspot-staging
      env:
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

    - name: Health check
      run: |
        sleep 30
        curl -f https://slangspot-staging.up.railway.app/health/ || echo "Health check failed"

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Railway (Production)
      uses: railwayapp/actions@v1
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: slangspot-production
      env:
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

    - name: Run production migrations
      run: |
        # If you need to run migrations after deployment
        echo "Migrations will be handled by Railway's build process"

    - name: Health check
      run: |
        sleep 60  # Wait longer for production
        curl -f https://slangspot.up.railway.app/health/ || echo "Health check failed"

    - name: Performance monitoring
      run: |
        # Basic performance check
        curl -w "@curl-format.txt" -o /dev/null -s https://slangspot.up.railway.app/ || echo "Performance check failed"

  notify:
    needs: [test, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "🚨 CI/CD Pipeline Failed - SlangSpot Latino"
        channel: "#deployments"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "✅ CI/CD Pipeline Success - SlangSpot Latino Deployed"
        channel: "#deployments"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Create deployment summary
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "- **Production URL:** https://slangspot.up.railway.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Staging URL:** https://slangspot-staging.up.railway.app" >> $GITHUB_STEP_SUMMARY
        fi